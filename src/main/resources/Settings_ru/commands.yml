config-version: 4

# Переключатели команд /rtp.
# Права всё равно проверяются: OP получает админские права по умолчанию из plugin.yml.
# Если команда выключена здесь, она скрывается из /rtp help, tab-complete и обычного запуска.
#
# /rtp settings открывает кликабельное меню для этих переключателей прямо в игре.
# В публичной сборке она выключена по умолчанию. Включите commands.admin.settings.enabled
# вручную, если хотите управлять переключателями прямо из игры.
#
# Команды отладки/поддержки:
# /rtp doctor       - здоровье запуска/конфигов.
# /rtp dump         - создает zip для поддержки в plugins/sRandomRTP/Diagnostics.
# /rtp stats        - live-метрики RTP/search/chunk/portal.
# /rtp portal check - проверяет отсутствующие миры, дубли порталов и активные portal tasks.
#
# Админские bossbar:
# /rtp tpsbar, /rtp rambar, /rtp msptbar и /rtp allbars теперь обычные debug-переключатели.
# По умолчанию они выключены; включить их можно здесь или через /rtp settings после включения меню.

commands:
  player:
    rtp:
      enabled: true
    near:
      enabled: true
    far:
      enabled: true
    middle:
      enabled: true
    base:
      enabled: true
    biome:
      enabled: true
    world:
      enabled: true
    back:
      enabled: true
    cancel:
      enabled: true
    accept:
      enabled: true
    deny:
      enabled: true

  admin:
    player:
      enabled: true
    portal:
      enabled: true
    chunky:
      enabled: true
    version:
      enabled: true
    reload:
      enabled: true
    help:
      enabled: true
    settings:
      enabled: false

  debug:
    doctor:
      enabled: false
    dump:
      enabled: false
    stats:
      enabled: false
    portal-check:
      enabled: false
    allbars:
      enabled: false
    tpsbar:
      enabled: false
    rambar:
      enabled: false
    msptbar:
      enabled: false
