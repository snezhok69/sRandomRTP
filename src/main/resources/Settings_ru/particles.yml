teleport:
  particles:
    # Если true, частицы при успешной телепортации включены.
    # Если false, частицы при успешной телепортации отключены.
    enabled: true
    # Если true, частицы видны только игроку.
    # Если false, частицы видны всем.
    visibleToPlayerOnly: true
    # Все частицы https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Particle.html
    # Тип частицы. Названия гибкие: FLAME, flame, minecraft:flame или номер enum.
    types:
    - HEART
    - FLAME
    # Количество частиц, создаваемых за один раз.
    count: 30
    # Смещение частиц по оси X. Определяет разброс частиц по оси X.
    offsetX: 0.5
    # Смещение частиц по оси Y. Определяет разброс частиц по оси Y.
    offsetY: 0.5
    # Смещение частиц по оси Z. Определяет разброс частиц по оси Z.
    offsetZ: 0.5
    # Необязательный параметр. В некоторых случаях используется для скорости частицы.
    extra: 0.01
    # Длительность отображения частиц в секундах
    duration: 5
