teleport:
  # Ссылка на все биомы - https://hub.spigotmc.org/javadocs/spigot/org/bukkit/block/Biome.html.
  # Здесь вы можете указать биомы, в которые плагин не будет телепортироваться.
  # '' - пишите без этого символа. Пишите в столбец, как в блоках.
  bannedBiomes:
    - SWAMP
  # Минимальная высота (Y-координата) для телепортации
  # Это предотвращает телепортацию в пещеры и подземные области
  minY: 58
  minY-end: 55
  minY-nether: 30
  # Если true, автоматически блокирует все биомы, в названии которых есть "CAVES"
  # Это помогает предотвратить телепортацию в пещерные биомы, такие как LUSH_CAVES, DRIPSTONE_CAVES и т.д.
  block-cave-biomes: true
  # Если true, автоматически блокирует все биомы, в названии которых есть "OCEAN" или "RIVER"
  # Это помогает предотвратить телепортацию в биомы океана/реки, такие как OCEAN, RIVER, FROZEN_OCEAN и т.д.
  block-ocean-river-biomes: true
  # Радиус по умолчанию для случайной телепортации от центра мира.
  # Это значение будет использоваться для всех миров, если оно не переопределено в настройках для каждого мира.
  # Плагин автоматически скорректирует это значение, если оно превышает размер границы мира.
  radius: 1000
  # Минимальный радиус телепортации по умолчанию - игроки не будут телепортированы ближе, чем это расстояние от спауна.
  # Например, если радиус равен 10, а минимальный радиус равен 1, вы будете телепортированы в пределах этого диапазона радиусов.
  # ВНИМАНИЕ: НЕ УСТАНАВЛИВАЙТЕ РАДИУС И МИНИМАЛЬНЫЙ РАДИУС ОДИНАКОВЫМИ - СЕРВЕР МОЖЕТ ВЫЛЕТЕТЬ!!!
  # Это значение будет использоваться для всех миров, если оно не переопределено в настройках для каждого мира.
  minradius: 100
  # Настройки радиуса для каждого мира (необязательно) - переопределяет радиус/минимальный радиус по умолчанию для конкретных миров.
  # Это позволяет устанавливать различные диапазоны телепортации для каждого мира.
  # Если мир не указан здесь, он будет использовать значения радиуса и минимального радиуса по умолчанию, указанные выше.
  # Плагин автоматически гарантирует, что эти значения не превышают размер границы мира.
  # Формат:
  #   world_name:
  #     radius: <максимальное расстояние от центра>
  #     minradius: <минимальное расстояние от центра>
  per-world:
    world:
      radius: 7000
      minradius: 500
    world_nether:
      radius: 1000
      minradius: 100
    world_the_end:
      radius: 1500
      minradius: 200
    my_custom_world:
      radius: 500
      minradius: 50
  # Метод генерации координат: CIRCLE, SQUARE
  # CIRCLE - генерирует координаты в круговой области (по умолчанию)
  # SQUARE - генерирует координаты в квадратной области
  coordinate-generation: CIRCLE
  # Если true, minradius будет рассматриваться как абсолютные координаты
  # Например, если minradius равен 500000, координаты будут находиться на расстоянии не менее 500000 блоков от центра
  use-absolute-coordinates: true
  # Настройки для попытки нескольких возможных местоположений параллельно
  parallel-search:
    # Включает режим параллельного поиска кандидатов.
    enabled: false
    # Количество кандидатов, оцениваемых за одну попытку при включенном параллельном поиске (рекомендуется 2-3).
    candidates-per-batch: 2
  # Радиус до ближайшей точки телепортации к региону по команде /rtp base. Рекомендуемое минимальное число - 10, если вы установите число меньше, команда /rtp base может перестать работать.
  regionradius: 10
  # Если true – когда кто-то пытается телепортировать вас с помощью команды /rtp player, вы увидите сообщение, уведомляющее вас о попытке телепортации.
  # Если false – когда кто-то пытается телепортировать вас с помощью команды /rtp player, вы не увидите сообщение, уведомляющее вас о попытке телепортации.
  rtp-player-messages: false
  # Здесь вы можете указать блоки, в которые плагин не будет телепортироваться.
  # Это блоки по умолчанию, лучше их не менять!
  # В противном случае, это может телепортировать вас в воду, даже если это запрещено, потому что SEAGRASS - это ОТДЕЛЬНЫЙ БЛОК.
  # Ссылка на все блоки minecraft - https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html.
  bannedBlocks:
    - LAVA
    - WATER
    - TALL_SEAGRASS
    - SEAGRASS
    - KELP_PLANT
    - KELP
  # Вкл/выкл выполнение команд при успешной телепортации.
  Commandsteleport:
    # Вкл/выкл выполнение команд при успешной телепортации.
    enabled: true
    # Список команд.
    Commands:
      - give %player% diamond 1
  # Сколько попыток требуется для успешной телепортации.
  maxtries: 1000
  # Перезарядка команды, указывается в секундах.
  Cooldowns:
    # Если true, перезарядка будет применена, если вы получите урон.
    # Если false, перезарядка не будет применена, если вы получите урон.
    dmg-cancel-cooldown: false
    # Если true, перезарядка будет применена, если вы двигаете мышью. (Работает только если включена функция move-cancel-cooldown.)
    # Если false, перезарядка не будет применена, если вы двигаете мышью. (Работает только если включена функция move-cancel-cooldown.)
    mouse-move-cancel-cooldown: false
    # Если true, перезарядка будет применена, если вы двигаетесь.
    # Если false, перезарядка не будет применена, если вы двигаетесь.
    move-cancel-cooldown: false
    # Если true, перезарядка будет применена, если вы начнете ломать блок.
    # Если false, перезарядка не будет применена, если вы начнете ломать блок.
    break-block-cooldown: false
    # Если true, перезарядка будет применена к команде.
    # Если false, перезарядка не будет применена к команде.
    enabled: true
    # Перезарядка, которая будет наложена на команду в секундах.
    cooldown: 60
  # Если true - телепортация будет отменена, если вы получите урон.
  # Если false - вы будете телепортированы, даже если получите урон.
  damaged-cancel-rtp: true
  # Если true, телепортация будет отменена, если вы двигаетесь.
  # Если false - телепортация не будет отменена, если вы двигаетесь.
  move-cancel-rtp: true
  # Чтобы функция mouse-move-cancel-rtp работала, вы ДОЛЖНЫ включить move-cancel-rtp!
  # Если true - телепортация будет отменена, если вы двигаете мышью.
  # Если false - телепортация не будет отменена, если вы двигаете мышью.
  mouse-move-cancel-rtp: false
  # Если true, телепортация будет отменена, если вы начнете ломать блок.
  # Если false, телепортация не будет отменена, если вы начнете ломать блок.
  break-block-cancel-rtp: false
  # Включает или отключает функцию проверки случайной телепортации в регионах.
  # Если true - плагин не будет телепортироваться в регионы.
  # Если false - плагин будет телепортироваться в регионы.
  checking-in-regions: false
  # Функция блокировки миров.
  bannedworld:
    # Если true, миры в списке будут заблокированы для телепортации.
    # Если false, миры из списка не будут заблокированы для телепортации.
    enabled: false
    # Список заблокированных миров.
    worlds:
      - world
      - world1
      - world2
    # Настройка перенаправления.
    redirect:
      # Если включено (true), при попытке телепортации в запрещенный мир вы получите сообщение о том, что мир запрещен, а затем немедленно начнете телепортироваться в мир перенаправления.
      enabled: true
      # Мир для перенаправления.
      world: world
  achievement:
    # Проверка достижений игрока. Работает с командой /rtp world. Требуемые достижения: 'Fiery bowels' для адского мира; 'The end?' для мира Края (эндер-мира);
    # Если true, игрок не будет телепортирован в мир Ада, если у него нет требуемого достижения.
    # Если false, игрок будет телепортирован в мир Ада, даже если у него нет требуемого достижения.
    nether-enabled: false
    # Если true, игрок не будет телепортирован в мир Края, если у него нет требуемого достижения.
    # Если false, игрок будет телепортирован в мир Края, даже если у него нет требуемого достижения.
    the-end-enabled: false
  # Настройки таймаутов телепортации
  teleport-timeout:
    # Если true — используются пользовательские таймауты телепортации.
    # Если false — таймаут выключается.
    enabled: true
    # Таймаут в миллисекундах для одной попытки телепортации.
    # Если подходящая локация не найдена за это время,
    # попытка считается неудачной и начинается новая.
    attempt-timeout-ms: 4000
    # Общий таймаут в миллисекундах для всего процесса поиска телепорта.
    # Если подходящая локация не найдена за это время,
    # запрос на телепортацию отменяется.
    total-timeout-ms: 15000
