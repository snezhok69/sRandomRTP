teleport:
  Money:
   # Если true, деньги будут списаны после успешной телепортации. (Требуется Vault)
   # Если false, деньги не будут списаны после успешной телепортации. (Требуется Vault)
   enabled: false
    # Количество денег, которое будет списано после телепортации.
   money: 100
  Levels:
   # Если true, опыт будет списан после успешной телепортации.
   # Если false, опыт не будет списан после успешной телепортации.
   enabled: false
    # Количество уровней, которое будет списано после телепортации.
   level: 10
  Hunger:
   # Если true, еда будет списана после успешной телепортации.
   # Если false, еда (голод) не будет списана после успешной телепортации.
   enabled: false
   # Если написано 1, то будет списано не 1 "голода", а половина (0.5). То есть, чтобы списать 1 "голод" необходимо написать значение 2.
   hunger: 10
  Health:
   # Если true, то после успешной телепортации будут списаны жизни.
   # Если false, после успешной телепортации жизни не будут списаны.
   enabled: false
   # Если написано 1, то будет списано не 1 жизнь, а половина (0.5). То есть, чтобы списать 1 жизнь необходимо написать значение 2.
   health: 2
  Items:
    # Если true, то после успешной телепортации будут списаны предметы.
    # Если false, предметы не будут списаны после успешной телепортации.
    enabled: false
    # Это список предметов, которые будут списаны после телепортации.
    # Обязательно пишите, как указано в примере, иначе предметы могут не списаться.
    # Список всех предметов в minecraft - https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html
    requiredItems:
    - 'DIAMOND: 5'
    - 'GOLD_INGOT: 1'
