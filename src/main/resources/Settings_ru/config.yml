# Текст создан на сайте - https://texteditor.com/multiline-text-art/
#
# Заполнители (Placeholders):
# %sRandomRTP_rtp_count% - считает, сколько людей было телепортировано. Телепортации подсчитываются после успешной телепортации по /rtp, /rtp near, /rtp world, /rtp player, /rtp base.
#
# Права доступа (Permissions):
#
#
# (sRandomRtp.Cooldown.N - замените "N" на ваше время. С этим разрешением вы можете установить собственную перезарядку на команду /rtp и отсчет bossbar.
# Если разрешение не установлено, значения берутся из конфигов. Если перезарядка команды отключена, разрешение всё равно влияет только на отсчет bossbar.);
# (sRandomRTP.Command.bypass - обход перезарядки для команд и телепортации.);
# (sRandomRTP.Command.Rtp - разрешить использование команды /rtp.);
# (sRandomRTP.Command.Reload - разрешить использование команды /rtp reload.);
# (sRandomRTP.Command.Near - разрешить использование команды /rtp near.);
# (sRandomRTP.Command.Version - разрешить использование команды /rtp version.);
# (sRandomRTP.Command.Help - разрешить использование команды /rtp help.);
# (sRandomRTP.Command.World - разрешить использование команды /rtp world.);
# (sRandomRTP.Command.Cancel - разрешить отмену rtp с помощью команды - /rtp cancel.);
# (sRandomRTP.Command.Back - позволяет использовать команду - /rtp back.);
# (sRandomRTP.Command.Base - позволяет использовать команду - /rtp base.);
# (sRandomRTP.Command.Chunky - позволяет использовать команду - /rtp chunky.);
# (sRandomRTP.Command.Player - позволяет использовать команду - /rtp player.);
# (sRandomRTP.Command.Deny - позволяет использовать команду /rtp deny (эта команда работает исключительно с командой /rtp player!);
# (sRandomRTP.Command.Accept - позволяет использовать команду /rtp accept (эта команда работает исключительно с командой /rtp player!);
# (sRandomRTP.Command.Portal - позволяет использовать команду - /rtp portal list/del/set.;
# (sRandomRTP.Command.Settings - позволяет использовать /rtp settings для переключения команд прямо в игре.);
# (sRandomRTP.Command.Doctor - позволяет использовать диагностику запуска/конфигов /rtp doctor.);
# (sRandomRTP.Command.Dump - позволяет создать support bundle через /rtp dump.);
# (sRandomRTP.Command.Stats - позволяет использовать runtime-диагностику /rtp stats.);
# (sRandomRTP.Command.Portal.Check - позволяет использовать диагностику /rtp portal check.);
#
#
# Дополнительные алиасы для основной команды /rtp.
# Быстрый переключатель для всех алиасов ниже.
Command-Aliases-Enabled: false
# Укажите [] если хотите оставить только /rtp. Конфликтующие или неверные алиасы будут пропущены.
Command-Aliases:
  - randomtp
  - randomteleport

# Включает диагностику плагина.
# Если false, папка Diagnostics не создаётся автоматически, а диагностические отчёты/логи выключены.
diagnostic: false
# Определяет, следует ли включать автоматические уведомления о новых версиях плагина для игроков.
Auto-Checking-New-Version-Players-Enabled: true
# Определяет, следует ли включать автоматические уведомления о новых версиях плагина для консоли.
Auto-Checking-New-Version-Console-Enabled: true
# Частота проверки новых версий плагина (в секундах) (1800 секунд = 30 минут)
Period-Checking-New-Version: 1800

metrics:
  rtp:
    # Записывает диагностическую запись, если один RTP-запрос выполняется дольше указанного порога.
    # На скорость телепорта это не влияет; настройка нужна только для поиска медленных телепортов.
    slow-request-threshold-ms: 3000

# Язык по умолчанию для плагина, по умолчанию английский.
# Этот файл custom_messages создан для перевода на любой язык, который вы хотите
# de - Deutsch (German) || en - English (United States) || es - Español (Spanish) || fr - Français (French) || it - Italiano (Italian) ||
# ja - 日本語 (Japanese) || ko - 한국어 (Korean) || pl - Polski (Polish) || pt - Português (Brazilian Portuguese) || ru - Русский (Russian) ||
# ua - Українська (Ukrainian) || vi - Tiếng Việt (Vietnamese) || zh - 中文 (Simplified Chinese) || ar - العربية (Arabic)
Language: en

# Если true, сообщения "moved too quickly" будут отключены и не будут отображаться в консоли.
# Если false, сообщения "moved too quickly" будут включены и будут отображаться в консоли.
Disable-Moved-Too-Quickly-Messages: true
