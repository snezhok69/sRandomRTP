# Настройки оптимизации загрузки чанков
chunk-loading:
  # Радиус предварительной загрузки вокруг мест телепортации (в чанках).
  # Выполняется прямо перед телепортацией, чтобы избежать падения в пустоту/фризов,
  # загружая целевой чанк (и при необходимости соседние по радиусу).
  # 0 = только целевой чанк (всего 1 чанк)
  # 1 = целевой чанк + 4 соседа (всего 5 чанков)
  # 2 = целевой чанк + 8 соседей (всего 9 чанков)
  # 3 = целевой чанк + 16 соседей (всего 17 чанков)
  # Более высокие значения могут вызвать дополнительную задержку, поэтому регулируйте осторожно.
  # Рекомендуемые значения:
  # - 0 для серверов с высокой нагрузкой (один чанк)
  # - 1 для средней нагрузки (5 чанков)
  # - 2 для низкой нагрузки (9 чанков)
  preload-radius: 0
  # Включает подробное логирование для каждого шага загрузки чанка (true добавляет отладочные логи).
  debug_logs: false
  # Максимальное время (в секундах) ожидания чанков перед телепортацией в любом случае.
  timeout-seconds: 5
# Управляет асинхронным прогревом чанков вокруг точек спауна и игроков.
# Это фоновая система предзагрузки, которая периодически подгружает чанки,
# уменьшая лаги при передвижении/телепортации игроков в новые области.
# 
# Важно: это НЕ универсальный ускоритель RTP.
# На загруженных серверах прогрев может сам добавлять фоновое давление на очередь чанков,
# поэтому включать его лучше только после профилирования. Если у вас уже включены
# teleport.parallel-search и teleport.prefer-generated-chunks, оставьте прогрев выключенным,
# пока /rtp stats не покажет измеримую пользу: эти две функции уже дают большую часть
# ускорения без постоянной фоновой нагрузки. Рекомендуется только для серверов
# с низкой/средней нагрузкой и стабильным TPS.
chunk-warming:
  # Включает систему прогрева чанков.
  enabled: false
  # Радиус (в чанках), который будет предварительно загружен вокруг каждого целевого чанка. 1 = область 3x3, 2 = 5x5 и т.д.
  warm-radius: 1
  # Максимальное количество асинхронных запросов чанков, которые могут быть запущены за один цикл прогрева.
  loads-per-tick-budget: 24
  # Задержка (в тиках) между циклами прогрева.
  warm-period-ticks: 20
  # Максимальное количество незавершенных асинхронных запросов чанков, разрешенных одновременно.
  max-inflight-loads: 64
  # Приостановить прогрев, когда TPS падает ниже этого значения. Установите 0 или ниже, чтобы отключить проверку.
  tps-pause-threshold: 18.5
  # Прогревать чанки вокруг мировых точек спауна.
  warm-spawn-locations: true
  # Прогревать чанки вокруг онлайн-игроков.
  warm-player-locations: true
  # Запускать цикл прогрева вокруг мировых спаунов сразу после загрузки мира.
  trigger-on-world-load: true
  # Запускать цикл прогрева при входе игрока на сервер.
  trigger-on-player-join: true
  # Запускать цикл прогрева, когда игрок входит в новый чанк.
  trigger-on-player-move: true
