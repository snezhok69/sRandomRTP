teleport:
  # Если true, будет задержка боссбара.
  # Если false, задержки боссбара не будет.
  bossbarEnabled: true
  # Длительность телепортации
  # У игроков с sRandomRtp.Cooldown.N будет N секунд вместо этого значения.
  bossbar-time: 7
  # Если true, actionbar включен.
  # Если false, actionbar выключен.
  actionBarEnabled: true
  # Определяет цвет полосы боссбара.
  # Значение может быть одним из предопределенных цветов, например:
  # PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
  bar-color: BLUE
  # Определяет стиль полосы боссбара.
  # Значение может быть одним из предопределенных стилей, например:
  # SOLID (сплошной) означает, что прогресс здоровья босса будет отображаться
  # как непрерывная полоса или заполненный цвет.
  # SEGMENTED_6 (сегментированный с 6 сегментами) означает, что
  # прогресс здоровья будет разделен на 6 равных сегментов,
  # и каждый сегмент будет отображаться отдельно.
  # SEGMENTED_10 (сегментированный с 10 сегментами) работает аналогично,
  # но с 10 сегментами вместо 6.
  # SEGMENTED_12 (сегментированный с 12 сегментами) отображает прогресс здоровья босса с 12 сегментами.
  # SEGMENTED_20 (сегментированный с 20 сегментами) использует 20 сегментов
  # для отображения прогресса здоровья босса.
  bar-style: SOLID
