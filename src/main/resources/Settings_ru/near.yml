teleport:
  # Минимальный радиус для выбора случайной точки телепортации при использовании команды /rtp near.
  # Если расстояние до ближайшего игрока меньше этого радиуса, будет выбрана случайная точка в пределах этого радиуса вокруг игрока.
  minRadius: 2
  # Максимальный радиус для выбора случайной точки телепортации при использовании команды /rtp near.
  # Этот радиус применяется, когда расстояние до ближайшего игрока больше или равно minDistanceToPlayer.
  maxRadius: 100
