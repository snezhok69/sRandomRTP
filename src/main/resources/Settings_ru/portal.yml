# Команды, которые будут выполнены при прыжке в портал
portal-commands:
  # Включить/отключить выполнение команд при входе в портал
  enabled: true
  # Список команд для выполнения
  # %player% ник игрока
  commands:
    - say %player% вошел в портал!
    - effect give %player% speed 30 2
# Настройка перезарядки для портала
portal:
  rtp:
    enabled: false  # Установите true для активации RTP при входе в портал
    world: "world"  # Укажите название мира для телепортации
  # Если false, блоки портала можно ломать и заменять на свои, но это может нарушить базу данных и вызвать баг.
  # Если true, блоки портала нельзя ломать.
  protect_blocks: true
  # Материалы портала
  # Ссылка на все блоки minecraft - https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html
  materials:
    # Блоки под порталом
    floor: "GLASS"
    # Границы портала
    border: "OBSIDIAN"
  # Настройка партиклов для портала
  particles:
    # Частицы для пола портала
    # Все частицы https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Particle.html
    floor: "PORTAL"
    # Количество частиц, создаваемых в каждой точке
    floor_count: 2
    # Плотность точек (меньшее значение = больше точек)
    floor_density: 0.5
    # Разброс частиц в каждой точке
    floor_spread: 0.1
    # Частицы, которые будут на краях портала
    # Все частицы https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Particle.html
    border: "FLAME"
    # Количество частиц, создаваемых в каждой точке
    border_count: 5
    # Плотность точек (меньшее значение = больше точек)
    border_density: 0.5
    # Разброс частиц в каждой точке
    border_spread: 0.1
    # Если false, частицы будут только при создании портала. Если true, частицы всегда будут на границах портала.
    permanent_border: false
  # Перезарядка портала после прыжка игрока
  cooldown:
    # Включить или отключить перезарядку для портала после прыжка
    enabled: true
    # Время в секундах
    time: 5
