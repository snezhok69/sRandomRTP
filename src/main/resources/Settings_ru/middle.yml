teleport-middle:
  # Настройка радиуса для обычной команды телепортации
  # Здесь вы можете указать радиус случайной телепортации от центра мира.
  radius-middle: 10000
  # Минимальный радиус телепортации, то есть, если радиус равен 10, а минимальный радиус равен 1, вы будете телепортированы в пределах этого радиуса.
  # НЕ РЕКОМЕНДУЕТСЯ УСТАНАВЛИВАТЬ РАДИУС И МИНИМАЛЬНЫЙ РАДИУС ОДИНАКОВЫМИ, СЕРВЕР МОЖЕТ ВЫЛЕТЕТЬ!!!
  minradius-middle: 5000
  # Метод генерации координат: CIRCLE, SQUARE
  # CIRCLE - генерирует координаты в круглой области (по умолчанию)
  # SQUARE - генерирует координаты в квадратной области
  coordinate-generation-middle: CIRCLE
  # Если true, minradius будет рассматриваться как абсолютные координаты
  # Например, если minradius равен 500000, координаты будут находиться на расстоянии не менее 500000 блоков от центра
  use-absolute-coordinates-middle: true
