config-version: 4

admin-bars:
  # Главный переключатель для всех admin bossbar-команд ниже.
  # Эти команды local-only и скрыты, пока не включен локальный JVM gate.
  # Видимость команд также можно менять в Settings/commands.yml или через /rtp settings.
  enabled: true

  # Интервал обновления мониторинговых bossbar.
  # 20 тиков = 1 секунда. Чем меньше значение, тем чаще обновление и тем выше нагрузка.
  update-interval-ticks: 20

  # Команда: /rtp allbars [on|off]
  # Права: sRandomRTP.Command.AllBars
  # Включает или выключает сразу все доступные admin bossbar для игрока.

  messages:
    enabled: '&a[sRandomRTP] &a%bar% включен.'
    disabled: '&a[sRandomRTP] &e%bar% выключен.'
    unavailable: '&a[sRandomRTP] &cЭта метрика недоступна на текущем ядре сервера.'
    command-disabled: '&a[sRandomRTP] &cЭта команда выключена в Settings/admin-bars.yml.'
    players-only: '&a[sRandomRTP] &cЭту команду могут использовать только игроки.'
    usage: '&a[sRandomRTP] &6Использование: /rtp %command% [on|off]'

  # Команда: /rtp tpsbar [on|off]
  # Права: sRandomRTP.Command.TpsBar
  # Плейсхолдеры: %value%, %tps%
  # На Paper/Folia используется прямой API, если он доступен.
  # На Spigot/CraftBukkit-подобных ядрах плагин пытается получить значение через кэшированный reflection fallback.
  # Если ядро не умеет честно отдавать TPS, команда скрывается из tab и сообщает о недоступности.
  tpsbar:
    enabled: true
    title: '&aTPS: &f%tps%'
    style: 'SEGMENTED_10'
    thresholds:
      warning-at-or-below: 18.0
      critical-at-or-below: 15.0
    colors:
      good: 'GREEN'
      warning: 'YELLOW'
      critical: 'RED'

  # Команда: /rtp rambar [on|off]
  # Права: sRandomRTP.Command.RamBar
  # Показывает использование heap JVM, а не всю RAM машины.
  # Плейсхолдеры: %value%, %used%, %max%, %free%, %percent%
  rambar:
    enabled: true
    title: '&6RAM: &f%used%MB&7/&f%max%MB &8(%percent%%)'
    style: 'SEGMENTED_10'
    thresholds:
      good-at-or-below: 60.0
      warning-at-or-below: 80.0
    colors:
      good: 'GREEN'
      warning: 'YELLOW'
      critical: 'RED'

  # Команда: /rtp msptbar [on|off]
  # Права: sRandomRTP.Command.MsptBar
  # Плейсхолдеры: %value%, %mspt%
  # max-scale управляет заполнением bossbar. 50.0 — хороший дефолт для контроля tick time.
  # На Spigot/CraftBukkit-подобных ядрах плагин пытается использовать fallback по tick times.
  # Если получить корректные данные нельзя, команда останется недоступной вместо показа ложных значений.
  msptbar:
    enabled: true
    title: '&bMSPT: &f%mspt%'
    style: 'SEGMENTED_10'
    max-scale: 50.0
    thresholds:
      good-at-or-below: 25.0
      warning-at-or-below: 40.0
    colors:
      good: 'GREEN'
      warning: 'YELLOW'
      critical: 'RED'
