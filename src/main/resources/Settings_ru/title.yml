teleport:
  # Нужно ли включать заголовок при успешной телепортации?
  # true - да
  # false - нет
  titleEnabled: true
  # Нужно ли включать подзаголовок при успешной телепортации?
  # true - да
  # false - нет
  subtitleEnabled: true
  # Время появления заголовка в секундах.
  titleFadeIn: 1.0
  # Время в секундах, в течение которого заголовок остается на экране.
  titleStay: 1.0
  # Время исчезновения заголовка в секундах.
  titleFadeOut: 1.0
  title-loading:
    # Нужно ли включать заголовок при успешной телепортации?
    # true - да
    # false - нет
    titleEnabled-loading: true
    # Нужно ли включать подзаголовок при успешной телепортации?
    # true - да
    # false - нет
    subtitleEnabled-loading: true
    # Время появления заголовка в секундах.
    titleFadeIn-loading: 0.5
    # Время в секундах, в течение которого заголовок остается на экране.
    titleStay-loading: 0.5
    # Время исчезновения заголовка в секундах.
    titleFadeOut-loading: 0.5
