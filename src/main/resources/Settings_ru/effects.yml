teleport:
  # Включает или отключает эффекты после телепортации.
  Enabled: true
  # Здесь можно указывать эффекты числом или названием.
  # Примеры: "11", "RESISTANCE", "resistance", "jump boost", "minecraft:speed".
  # Номера эффектов можно посмотреть здесь: https://www.digminecraft.com/lists/effect_list_pc.php
  Effect:
  - "11"
  - "12"
  - "13"
  # Это продолжительность эффекта в секундах
  effectDuration: 15
  # Сила эффекта.
  effectAmplifier: 255
  # Функция эффекта заморозки.
  Freeze:
    # Если true, то после телепортации будет применен эффект заморозки.
    # Если false, эффект заморозки не будет применен после телепортации.
    enabled: true
    # Время заморозки в секундах.
    time: 10
