config-version: 4

admin-bars:
  # Master switch for all admin monitoring bossbars below.
  # Command visibility is controlled in Settings/commands.yml or via /rtp settings.
  # The /rtp tpsbar, /rtp rambar, /rtp msptbar and /rtp allbars command switches are disabled by default.
  enabled: true

  # Update period for the live monitoring bossbars.
  # 20 ticks = 1 second. Lower values update more often but create more refresh work.
  update-interval-ticks: 20

  # Command: /rtp allbars [on|off]
  # Permission: sRandomRTP.Command.AllBars
  # Enables or disables every available admin bossbar for the player at once.

  messages:
    enabled: '&a[sRandomRTP] &a%bar% enabled.'
    disabled: '&a[sRandomRTP] &e%bar% disabled.'
    unavailable: '&a[sRandomRTP] &cThis metric is not available on this server core.'
    command-disabled: '&a[sRandomRTP] &cThis command is disabled in Settings/admin-bars.yml.'
    players-only: '&a[sRandomRTP] &cOnly players can use this command.'
    usage: '&a[sRandomRTP] &6Usage: /rtp %command% [on|off]'

  # Command: /rtp tpsbar [on|off]
  # Permission: sRandomRTP.Command.TpsBar
  # Placeholders: %value%, %tps%
  # On Paper/Folia the plugin uses direct API when available.
  # On Spigot/CraftBukkit-like cores it tries cached reflection fallback.
  # If the core cannot provide honest TPS data, the command is hidden from tab and will report unavailability.
  tpsbar:
    enabled: true
    title: '&aTPS: &f%tps%'
    style: 'SEGMENTED_10'
    thresholds:
      warning-at-or-below: 18.0
      critical-at-or-below: 15.0
    colors:
      good: 'GREEN'
      warning: 'YELLOW'
      critical: 'RED'

  # Command: /rtp rambar [on|off]
  # Permission: sRandomRTP.Command.RamBar
  # Shows JVM heap usage, not total machine RAM.
  # Placeholders: %value%, %used%, %max%, %free%, %percent%
  rambar:
    enabled: true
    title: '&6RAM: &f%used%MB&7/&f%max%MB &8(%percent%%)'
    style: 'SEGMENTED_10'
    thresholds:
      good-at-or-below: 60.0
      warning-at-or-below: 80.0
    colors:
      good: 'GREEN'
      warning: 'YELLOW'
      critical: 'RED'

  # Command: /rtp msptbar [on|off]
  # Permission: sRandomRTP.Command.MsptBar
  # Placeholders: %value%, %mspt%
  # max-scale controls bossbar progress. 50.0 is a good default for healthy tick time tracking.
  # On Spigot/CraftBukkit-like cores the plugin tries tick-time reflection fallback.
  # If the core cannot provide usable tick timing data, the command stays unavailable instead of showing fake values.
  msptbar:
    enabled: true
    title: '&bMSPT: &f%mspt%'
    style: 'SEGMENTED_10'
    max-scale: 50.0
    thresholds:
      good-at-or-below: 25.0
      warning-at-or-below: 40.0
    colors:
      good: 'GREEN'
      warning: 'YELLOW'
      critical: 'RED'
