config-version: 4

# Command gates are runtime switches for /rtp subcommands.
# Permissions still apply: OP players receive admin permissions by default from plugin.yml.
# If a command is disabled here, it is hidden from /rtp help, tab-complete and normal execution.
#
# /rtp settings opens an in-game clickable menu for these switches.
# It is disabled by default in public builds. Enable commands.admin.settings.enabled manually
# if you want to manage these switches from inside the game.
#
# Debug/support commands:
# /rtp doctor       - startup/config health.
# /rtp dump         - creates a support zip in plugins/sRandomRTP/Diagnostics.
# /rtp stats        - runtime RTP/search/chunk/portal metrics.
# /rtp portal check - checks missing worlds, duplicate portal names and active portal tasks.
#
# Admin bossbars:
# /rtp tpsbar, /rtp rambar, /rtp msptbar and /rtp allbars are normal debug switches now.
# They are disabled by default and can be enabled here or through /rtp settings after that menu is enabled.

commands:
  player:
    rtp:
      enabled: true
    near:
      enabled: true
    far:
      enabled: true
    middle:
      enabled: true
    base:
      enabled: true
    biome:
      enabled: true
    world:
      enabled: true
    back:
      enabled: true
    cancel:
      enabled: true
    accept:
      enabled: true
    deny:
      enabled: true

  admin:
    player:
      enabled: true
    portal:
      enabled: true
    chunky:
      enabled: true
    version:
      enabled: true
    reload:
      enabled: true
    help:
      enabled: true
    settings:
      enabled: false

  debug:
    doctor:
      enabled: false
    dump:
      enabled: false
    stats:
      enabled: false
    portal-check:
      enabled: false
    allbars:
      enabled: false
    tpsbar:
      enabled: false
    rambar:
      enabled: false
    msptbar:
      enabled: false
