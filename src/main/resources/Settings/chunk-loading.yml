# Chunk loading optimization settings
config-version: 4

chunk-loading:
  # Preload radius around teleport destinations (in chunks).
  # This runs right before teleporting to help avoid void/freeze by loading
  # the destination chunk (and optionally its neighbours depending on radius).
  # 0 = only the target chunk (1 chunk total)
  # 1 = target chunk + 4 neighbours (5 chunks total)
  # 2 = target chunk + 8 neighbours (9 chunks total)
  # 3 = target chunk + 16 neighbours (17 chunks total)
  # Higher values may introduce additional lag, so adjust carefully.
  # Recommended values:
  # - 0 for high-load servers (single chunk)
  # - 1 for medium load (5 chunks)
  # - 2 for low load (9 chunks)
  preload-radius: 0
  # Enables verbose logging for each chunk loading step (true adds debug logs).
  debug_logs: false
  # Maximum time (in seconds) to wait for chunks before teleporting anyway.
  timeout-seconds: 5
  # Controls asynchronous chunk warming around spawn points and players.
  # This is a background preloading system that periodically loads nearby chunks
  # to reduce lag spikes when players move/teleport into new areas.
  # Important: this is not a universal RTP accelerator.
  # On busy servers it can add extra background chunk pressure, so profile before enabling it.
chunk-warming:
  # Enables the chunk warming system.
  enabled: false
  # Radius (in chunks) that will be preloaded around each target chunk. 1 = 3x3 area, 2 = 5x5, etc.
  warm-radius: 1
  # Maximum amount of async chunk requests that can be started during a single warm cycle.
  loads-per-tick-budget: 24
  # Delay (in ticks) between warm cycles.
  warm-period-ticks: 20
  # Maximum amount of unfinished async chunk requests allowed at the same time.
  max-inflight-loads: 64
  # Pause warming when TPS drops below this value. Set to 0 or lower to disable the check.
  tps-pause-threshold: 18.5
  # Warm chunks around world spawn locations.
  warm-spawn-locations: true
  # Warm chunks around online players.
  warm-player-locations: true
  # Trigger a warm pass around world spawns right after a world is loaded.
  trigger-on-world-load: true
  # Trigger a warm pass when a player joins the server.
  trigger-on-player-join: true
  # Trigger a warm pass when a player enters a new chunk.
  trigger-on-player-move: true
