    - '&a[sRandomRTP] &cNo teleportation request found or it has expired.'
  commandhelp:
    - ''
    - '&cPlugin command help:'
    - ''
    - '&a/rtp - &6random teleportation.'
    - '&a/rtp world <your world> - &6teleportation in the specified world.'
    - '&a/rtp near - &6teleports to players.'
    - '&a/rtp help - &6displays command help.'
    - '&a/rtp version - &6checks for a new plugin version.'
    - '&a/rtp reload - &6reloads the plugin.'
    - '&a/rtp cancel - &6cancels teleportation during the boss bar.'
    - '&a/rtp back - &6returns to the place before teleportation.'
    - '&a/rtp base - &6teleports near WorldGuard regions.'
    - '&a/rtp player <player name>(or additional argument <world>, to teleport specified player to another world) - &6teleports the specified player.'
