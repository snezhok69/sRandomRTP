      - '&7Integrations: &fWorldGuard=%worldguard%, Vault=%vault%, Chunky=%chunky%, PlaceholderAPI=%placeholderapi%'
      - '&7Active searches: &f%active_searches% &8| &7Portal tasks: &f%portal_tasks%'
      - '&7Config versions: &f%config_versions%'
