    header: '&cPlugin command help:'
    rtp: '&a/rtp - &6random teleportation.'
    world: '&a/rtp world <world> - &6teleportation in the specified world.'
    near: '&a/rtp near - &6teleports near players.'
    help: '&a/rtp help - &6displays command help.'
    biome: '&a/rtp biome <biome|category> - &6teleports to selected biome.'
    far: '&a/rtp far - &6teleports farther than default.'
