    header: '&a[sRandomRTP] &6Settings &7(%page%/%max_page%)'
    description: '&7Debug commands and admin bossbars are controlled here. Permissions still apply.'
    category: '&8- &e%category%'
    categories:
      player: 'Player'
      admin: 'Admin'
      debug: 'Debug'
    flag-line: '  &7%command% &8(%id%) &7perm: &f%permission% '
    status-on: '&a[ON]'
    status-off: '&c[OFF]'
    status-locked: '&8[locked]'
    toggle-hover: '&7Toggle %command%'
    prev-button: '&a[< Previous]'
    prev-disabled: '&8[< Previous]'
    prev-hover: '&7Open previous settings page'
    next-button: '&a[Next >]'
    next-disabled: '&8[Next >]'
    next-hover: '&7Open next settings page'
    unknown:
      - '&a[sRandomRTP] &cUnknown setting: &f%id%'
    locked:
      - '&a[sRandomRTP] &e%command% is protected from in-game toggles.'
    invalid-mode:
      - '&a[sRandomRTP] &cUse: /rtp settings toggle %id% [on|off]'
    save-failed:
      - '&a[sRandomRTP] &cFailed to save Settings/commands.yml: %error%'
    changed:
      - '&a[sRandomRTP] &a%command% command is now %state%&a.'
    usage:
      - '&a[sRandomRTP] &6Usage:'
      - '&7/rtp settings [page]'
      - '&7/rtp settings toggle <id> [on|off]'
    command-disabled:
      - '&a[sRandomRTP] &cThis command is disabled in &fSettings/commands.yml&c: &e%id%'
