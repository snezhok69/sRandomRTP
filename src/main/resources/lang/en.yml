    - '&a[sRandomRTP] &cCannot create portals longer than &e90 &ccharacters. You exceeded the limit by &e %excessCharacters% &ccharacters.'
  error-portal-name-already-exists:
    - '&a[sRandomRTP] &cPortal with name &6%portalName% &calready exists.'
  error-insufficient-space:
    - '&a[sRandomRTP] &cNot enough space to create a portal with radius &6%radius%&c!'
