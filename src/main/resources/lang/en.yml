    back: '&a/rtp back - &6returns to the place before teleportation.'
    base: '&a/rtp base - &6teleports near WorldGuard regions.'
    player: '&a/rtp player <player> [world] - &6teleports another player.'
    accept: '&a/rtp accept - &6accepts a teleport request.'
    deny: '&a/rtp deny - &6denies a teleport request.'
    cancel: '&a/rtp cancel - &6cancels your active teleport.'
    portal: '&a/rtp portal <set|del|list> - &6manages RTP portals.'
    chunky: '&a/rtp chunky <radius|stop> - &6controls Chunky generation.'
    version: '&a/rtp version - &6checks for a new plugin version.'
    reload: '&a/rtp reload - &6reloads the plugin.'
    settings: '&a/rtp settings - &6opens command toggles.'
    doctor: '&a/rtp doctor - &6shows startup/config health.'
    stats: '&a/rtp stats - &6shows runtime metrics.'
    dump: '&a/rtp dump - &6creates a support bundle.'
    portal-check: '&a/rtp portal check - &6checks portal health.'
    tpsbar: '&a/rtp tpsbar - &6toggles the TPS admin bossbar.'
    rambar: '&a/rtp rambar - &6toggles the RAM admin bossbar.'
    msptbar: '&a/rtp msptbar - &6toggles the MSPT admin bossbar.'
    allbars: '&a/rtp allbars - &6toggles all admin bossbars.'
