    - ''
    - '&a[sRandomRTP] &6- &cPlugin disabled! %mc% ms'
    - ''
  # Portal
  error-radius-portal:
    - '&a[sRandomRTP] &cRadius must be between 1 and 10!'
  error-portal-name:
    - '&a[sRandomRTP] &cInvalid portal name. Use only letters and numbers. Special characters and spaces are not allowed.'
