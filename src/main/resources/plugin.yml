name: sRandomRTP
version: ${project.version}
main: org.sRandomRTP.Main
api-version: 1.16
folia-supported: true
softdepend:
  - WorldGuard
  - WorldEdit
  - Vault
  - PlaceholderAPI
  - Chunky
authors: [snezhok69_, Snon_S]
commands:
  rtp:
    description: Random teleport and sRandomRTP admin command.
    usage: /rtp [help|near|far|middle|biome|portal|player|world|chunky|settings|doctor|dump|stats]
    aliases: [randomtp, randomteleport]
permissions:
  sRandomRTP.Command.Rtp:
    description: Allows /rtp.
    default: true
  sRandomRTP.Command.Far:
    description: Allows /rtp far.
    default: op
  sRandomRTP.Command.Middle:
    description: Allows /rtp middle.
    default: op
  sRandomRTP.Command.Near:
    description: Allows /rtp near.
    default: true
  sRandomRTP.Command.Base:
    description: Allows /rtp base.
    default: op
  sRandomRTP.Command.RtpBiome:
    description: Allows /rtp biome.
    default: op
  sRandomRTP.Command.Back:
    description: Allows /rtp back.
    default: true
  sRandomRTP.Command.Cancel:
    description: Allows /rtp cancel.
    default: true
  sRandomRTP.Command.Version:
    description: Allows /rtp version.
    default: op
  sRandomRTP.Command.Player:
    description: Allows /rtp player.
    default: op
  sRandomRTP.Command.Portal:
    description: Allows /rtp portal.
    default: op
  sRandomRTP.Command.Reload:
    description: Allows /rtp reload.
    default: op
  sRandomRTP.Command.Chunky:
    description: Allows /rtp chunky.
    default: op
  sRandomRTP.Command.World:
    description: Allows /rtp world.
    default: true
  sRandomRTP.Command.Help:
    description: Allows /rtp help.
    default: true
  sRandomRTP.Command.Accept:
    description: Allows /rtp accept.
    default: true
  sRandomRTP.Command.Deny:
    description: Allows /rtp deny.
    default: true
  sRandomRTP.Command.Settings:
    description: Allows /rtp settings.
    default: op
  sRandomRTP.Command.Doctor:
    description: Allows /rtp doctor.
    default: op
  sRandomRTP.Command.Dump:
    description: Allows /rtp dump.
    default: op
  sRandomRTP.Command.Stats:
    description: Allows /rtp stats.
    default: op
  sRandomRTP.Command.AllBars:
    description: Allows /rtp allbars when local admin bars are enabled.
    default: op
  sRandomRTP.Command.TpsBar:
    description: Allows /rtp tpsbar when local admin bars are enabled.
    default: op
  sRandomRTP.Command.RamBar:
    description: Allows /rtp rambar when local admin bars are enabled.
    default: op
  sRandomRTP.Command.MsptBar:
    description: Allows /rtp msptbar when local admin bars are enabled.
    default: op
  sRandomRTP.Command.bypass:
    description: Bypasses RTP cooldown checks.
    default: op
  sRandomRTP.Cooldown.bypass:
    description: Legacy cooldown bypass permission.
    default: op
