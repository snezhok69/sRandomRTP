# Placeholders:
# %sRandomRTP_rtp_count% - counts how many people have been teleported. Teleportations are counted after successful teleportation by /rtp, /rtp near, /rtp world, /rtp player, /rtp base.
#
# Permissions:
#
#
# (sRandomRtp.Cooldown.N - replace "N" with your time. With this permission you can set a custom cooldown on the /rtp command and bossbar countdown.
# If the permission is not set, values are taken from the configs. If command cooldown is disabled, this permission still affects only the bossbar countdown.);
# (sRandomRTP.Command.bypass - bypass the cooldown for commands and teleportation.);
# (sRandomRTP.Command.Rtp - allow using the /rtp command.);
# (sRandomRTP.Command.Reload - allow using the /rtp reload command.);
# (sRandomRTP.Command.Near - allow using the /rtp near command.);
# (sRandomRTP.Command.Version - allow the /rtp version command to be used.);
# (sRandomRTP.Command.Help - allow the use of the /rtp help command.);
# (sRandomRTP.Command.World - allow the use of the /rtp world command.);
# (sRandomRTP.Command.Cancel - allow cancelling rtp with the command - /rtp cancel.);
# (sRandomRTP.Command.Back - allows you to use the command - /rtp back.);
# (sRandomRTP.Command.Base - allows you to use the command - /rtp base.);
# (sRandomRTP.Command.Chunky - allows you to use the command - /rtp chunky.);
# (sRandomRTP.Command.Player - allows to use the command - /rtp player.);
# (sRandomRTP.Command.Deny - allows the use of the /rtp deny command (this command works exclusively with the /rtp player command!);
# (sRandomRTP.Command.Accept - allows the use of the /rtp accept command (this command works exclusively with the /rtp player command!);
# (sRandomRTP.Command.Portal - allows you to use the /rtp portal list/del/set command.;
# (sRandomRTP.Command.Settings - allows you to use /rtp settings to toggle command gates in game.);
# (sRandomRTP.Command.Doctor - allows you to use /rtp doctor startup/config diagnostics.);
# (sRandomRTP.Command.Dump - allows you to create a support bundle with /rtp dump.);
# (sRandomRTP.Command.Stats - allows you to use /rtp stats runtime diagnostics.);
# (sRandomRTP.Command.Portal.Check - allows you to use /rtp portal check diagnostics.);
#
#

# Internal file version used for automatic config migrations.
config-version: 4

# Extra aliases for the main /rtp command.
# Set this to [] if you want only /rtp to work. Conflicting or invalid aliases are skipped.
Command-Aliases:
  - randomtp
  - randomteleport

# debug to the console, which are displayed when using the /rtp command
logs: false
# Determines whether to enable automatic notifications about new plugin versions for players.
Auto-Checking-New-Version-Players-Enabled: true
# Determines whether to enable automatic notifications about new plugin versions for the console.
Auto-Checking-New-Version-Console-Enabled: true
# Frequency of checking for new plugin versions (in seconds) (1800 seconds = 30 minutes)
Period-Checking-New-Version: 1800

metrics:
  rtp:
    # Writes a diagnostic entry when one RTP request is slower than this threshold.
    # This does not affect teleportation speed; it is only for troubleshooting slow searches.
    slow-request-threshold-ms: 3000

# Default language for the plugin, English by default.
# This file custom_messages is created to be translated into any language you want
